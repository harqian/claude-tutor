summary: |
  Two sessions to date.

  Session 2026-05-04 (9 days to AP exam): diagnostic across inference (CI
  interpretation, paired vs independent identification, pooled vs unpooled,
  scope-of-inference 2x2) — all locked after probing. Slope inference taught
  end-to-end (t-procedure analogy, SE_b, df = n-2 via constraint argument,
  H0/Ha, LINER, regression printouts, rubric phrasing). Carded H0/Ha sign-flip
  pattern after observing it twice (2-prop, then slope).

  Session 2026-05-06 (1 day to school AP-style test): mixed FRQ drill biased
  toward untested concepts. Three findings:

  (1) Chi-square selection rule was the named gap. Test mechanics carded
  prior, but independence-vs-homogeneity distinguishing rule was effectively
  unseen. Taught operational rule (1 sample 2 vars → independence; 2+ samples
  1 var → homogeneity; 1 sample 1 var + claimed dist → GOF), distinguished
  by sampling design (what's fixed by design vs random). Three cards.

  (2) FRQ A revealed sampling-distribution-of-mean confusion: wrote
  SD = σ/n (instead of σ/√n), used t-distribution for a probability calc
  with known σ (should be z), and parroted "right-skewed" for the sampling
  distribution shape when CLT applies. The contradiction was that part (c)
  he correctly invoked the CLT, but in part (a) treated the sampling
  distribution as inheriting the population's right-skew. Demoted
  sampling-dist-mean to shaky. Four mistake-flavored cards.

  (3) Type I/II + power was a known gap with no cards. Taught from scratch
  via two-overlapping-curves picture, then built interactive viz at
  out/artifacts/2026-05-06_193100_power-tradeoff.html (sliders for n, σ,
  μ_a, α; direct-manipulation cutoff and effect-size handles). Mnemonic
  Option A landed (1 ↔ null world, 2 ↔ alternative world). FRQ E surfaced
  the most common student misconception: treating effect size as a lever
  the researcher controls. Two cards.

  H0/Ha sign-flip pattern not retested this session — assume still latent.

