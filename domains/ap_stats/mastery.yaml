# Selective log. Only entries worth remembering long-term.
log:
  - ts: 2026-05-04T17:30:00-07:00
    mode: socratic
    concept: multiple
    note: |
      Diagnostic + first-pass slope teaching. Probed: CI interpretation,
      paired vs independent (introduced shuffle test), pooled vs unpooled
      (initial backwards sign on H0 - good correction), scope of inference
      2x2 (took 7 turns to derive but locked it). 3 card-worthy aha moments,
      all carded mid-session. Slope teaching paused at df = n-2; resume from
      'how many parameters did you estimate to compute residuals?'.
    mochi_cards:
      - id: yWwQvRrX
        deck: important ap
        front: "Paired vs independent samples: what's the operational test to tell them apart?"
        back: "Can you randomly shuffle one group's data without losing information? Yes -> independent. No -> paired (each row in group A is linked to a specific row in group B by design)."
      - id: dUMPYSdO
        deck: important ap
        front: "Why does the 2-prop z-test use pooled $\\hat{p}$ while the CI uses unpooled?"
        back: "Test assumes $H_0: p_1 = p_2$, so both samples estimate one shared $p$ (pool). CI assumes nothing, so each sample estimates its own."
      - id: ILdotUEY
        deck: important ap
        front: "Random sampling vs random assignment — which gives causal, which gives generalizable?"
        back: "Assignment → causal (kills confounding). Sampling → generalizable (kills selection bias)."
      - id: 4V4RXMwg
        deck: important ap
        front: "Why does estimating a parameter from your data cost a degree of freedom?"
        back: "Each estimated parameter imposes one linear constraint on residuals. df = n - (parameters estimated). Generalizes to χ² GOF (df = k-1) and χ² independence (df = (r-1)(c-1)) via the same constraint argument."
      - id: CXdNB2KW
        deck: important ap
        front: "H0 vs Ha: what's the rule for what goes into each?"
        back: "H0 is always the null/no-effect/equality version. Ha is what you're trying to find evidence for. Prosecutor mnemonic: H0 is what the prosecutor doesn't want to be true; the data is the evidence."
      - id: t8YWQ0wU
        deck: important ap
        front: "LINER conditions for slope inference — what each letter checks and why"
        back: "L: linear (scatterplot/residual plot). I: independent observations. N: normal residuals. E: equal variance (homoscedasticity, residual plot is uniform band). R: random sample/assignment."
      - id: SyJe7Rrq
        deck: important ap
        front: "HT conclusion: AP rubric template + the trap"
        back: "4-piece skeleton: (1) compare p-value to α, (2) decision about H0, (3) 'convincing evidence' phrase, (4) population scope. Trap: significance ≠ generalizability; generalizability comes from sampling design, not p-value."

  - ts: 2026-05-06T20:00:00-07:00
    mode: drill
    concept: multiple
    note: |
      Mixed FRQ drill, night before school AP-style test. Started in drill
      mode, pivoted to socratic for chi-square selection (untested gap),
      then back to FRQ-style for sampling-distribution and power.

      Three findings worth remembering:

      (1) Chi-square selection: he could pick the right test (GOF /
      independence / homogeneity) given a scenario but couldn't articulate
      the criterion. Taught the operational rule: count samples and
      variables, attend to what's fixed by design vs random. Conclusion-
      language difference (associated vs differs across) is what the rubric
      enforces. Three cards.

      (2) Sampling distribution of x̄: solid in self-report, shaky on
      execution. FRQ A (factory soda probability) revealed σ/n vs σ/√n
      formula slip, t-vs-z confusion (used t-distribution for a probability
      calc with given σ), and population-shape-vs-sampling-shape parroting.
      Demoted to shaky. Four mistake-flavored cards covering each error.

      (3) Power + Type I/II: was a flagged gap. Taught from scratch via
      two-overlapping-curves picture, then built an interactive viz with
      direct-manipulation cutoff and effect-size handles (lives at
      out/artifacts/2026-05-06_193100_power-tradeoff.html). Mnemonic
      Option A landed (1 ↔ null world, 2 ↔ alternative world). FRQ E
      revealed the textbook student misconception: treating effect size
      as a lever the researcher controls. Re-test on next FRQ. Two cards.

      Process notes:
      - First card pair on Type I/II ("boy who cried wolf") was rejected
        as bad mnemonic; replaced with Option A (worlds 1 and 2). Original
        cards deleted.
      - First card on power tradeoff was deleted with the boy-who-cried-
        wolf card; replaced with the four-levers card after the viz lesson.
      - Updated feedback memory feedback_socratic_blanks.md: extended the
        "skip socratic when content is unseen" rule to also cover "skip
        socratic when content is genuinely shaky / not really understood."
        Triage ladder: really not understanding → just teach. Kinda shaky
        → ask. Solid → keep socratic.

      Downloaded 2025/2024/2023 AP Stats FRQ + scoring guidelines PDFs to
      ~/Downloads/ap/ for review.
    mochi_cards:
      - id: sEaGa2bA
        deck: important ap
        front: "When do you use a $\\chi^2$ goodness-of-fit test?"
        back: "One sample, one categorical variable, comparing observed counts to a claimed/theoretical distribution. df = k - 1. Conclusion: 'differs from the claimed distribution.'"
      - id: zlEPQ6GP
        deck: important ap
        front: "When do you use a $\\chi^2$ test for independence?"
        back: "One sample, two categorical variables measured on each subject. Only the grand total is fixed by design. df = (r-1)(c-1). Asks: are the variables associated? Conclusion: 'associated.'"
      - id: pNm8GlC2
        deck: important ap
        front: "When do you use a $\\chi^2$ test for homogeneity?"
        back: "Two or more separate samples (one per group), one categorical variable per subject. Group sizes (row totals) fixed by design. df = (r-1)(c-1). Asks: do distributions differ across groups? Conclusion: 'differs across groups.'"
      - id: hbSSLhDu
        deck: important ap
        front: "Type I vs Type II error — what's the rule, tied to '1' and '2'?"
        back: "Two worlds. World 1 (H0 true): only mistake is rejecting → Type 1 = false alarm, prob α (you set this). World 2 (Ha true): only mistake is failing to reject → Type 2 = missed it, prob β. Power = 1-β. Mnemonic: 1 ↔ null world, 2 ↔ alternative world. NOT α + β = 1."
      - id: c39Qwm2e
        deck: important ap
        front: "For the sampling distribution of $\\bar{X}$: center, spread, shape?"
        back: "Center: μ. Spread: σ/√n (NOT σ/n). Shape: n ≥ 30 → approximately Normal by CLT regardless of population; n < 30 → depends on population shape. Averages are tighter and rounder than individual observations."
      - id: Xl12gYR2
        deck: important ap
        front: "When computing P(x̄ < c): what's the SE, and why is it not just σ?"
        back: "Divide by σ/√n, NOT σ. The /√n is the entire signature of 'I'm working with a sample mean, not a single value.' Without √n, you've computed the prob for ONE observation."
      - id: 1okDBlGw
        deck: important ap
        front: "Probability about x̄: z or t? When does t come in?"
        back: "z when σ is known (probability calc on a sampling distribution; not inference). t only when σ is unknown and you've replaced it with sample SD s (inferential setting: CI or HT). Trigger for t is unknown σ, not 'sample mean.'"
      - id: kjLoLlTv
        deck: important ap
        front: "Population is right-skewed — what's the shape of the sampling distribution of x̄?"
        back: "Depends on n. n ≥ 30: approximately Normal by CLT (skew gets averaged out). n < 30: inherits population skew. Population shape ≠ sampling distribution shape; CLT is the bridge."
      - id: 0vWQGYP4
        deck: important ap
        front: "Power = 1 - β depends on what 4 things, and how does each lever move it?"
        back: "↑n (smaller SE, narrower curves), ↑effect size (curves further apart; usually NOT under researcher control), ↓σ (smaller SE; via better measurement / homogeneous samples / paired design), ↑α (looser cutoff; trades against Type I rate). Tradeoff: at fixed design, lowering α raises β. To shrink both, narrow the curves themselves."

