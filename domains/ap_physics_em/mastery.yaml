log:
  - ts: 2026-05-03T00:00:00Z
    mode: socratic
    concept: conductors-equilibrium
    note: "rebuilt E=0 argument from equilibrium, not Gauss. caught Gauss direction error himself via external-charge counterexample. extended to surface E perpendicular. 4 mochi cards created."
    mochi_cards:
      - id: UuCpRgvU
        deck: ap e&m
        front: "Why is E = 0 inside a conductor in equilibrium?"
        back: "Free charges would feel F = qE and accelerate if E ≠ 0. Equilibrium means nothing moves, so E must be zero at every interior point. Applies to strict interior only - not the surface. No Gauss needed; it follows directly from the definition of equilibrium."
      - id: fe0WqF5C
        deck: ap e&m
        front: "Why does all charge in a conductor sit on the surface?"
        back: "E = 0 inside (from equilibrium) → Gauss's law on any interior surface gives flux = 0 → q_enc = 0 → no net charge in the interior. Logic runs: equilibrium → E=0 → (Gauss) → charge on surface. Not the reverse."
      - id: hMPpoNmf
        deck: ap e&m
        front: "Why is V constant throughout a conductor in equilibrium?"
        back: "V = -∫E dr. E = 0 everywhere inside, so the integral is zero between any two interior points. ΔV = 0 means V is the same everywhere - not necessarily zero, just flat. Same value inside and on the surface."
      - id: 4r4abHVi
        deck: ap e&m
        front: "What direction is E at the surface of a conductor, and why?"
        back: "Perpendicular to the surface (no tangential component). If there were a tangential component, surface charges would slide along the surface - not equilibrium. Works for any shape, not just spheres."
  - ts: 2026-05-10T00:00:00Z
    mode: socratic
    concept: coulomb-gauss
    note: |
      Codex session (Claude reconciled afterward from pasted transcript).
      Coulomb/Gauss probed deeply, plus dc-circuits opening.

      Flux invariance reflex installed across all relevant cases: radius
      doubling on centered point charge, off-center enclosed charge, external
      charge, mixed-sign enclosed (+Q and -Q -> 0; +2Q and -Q -> Q/eps0),
      uniform external field, nonuniform external field (strong-over-small-
      area balances weak-over-large-area).

      Symmetry-based field extraction: line charge via cylinder (L cancels
      because q_enc and curved-wall area both scale with L), nonconducting
      sheet via pillbox or rectangular box (2EA because field exits both
      sides), conductor surface (factor of 2 disappears because E=0 in
      metal; only outside face contributes). Slab paradox resolved: tiny
      box and big box give same field because per-face sigma is the right
      local density; total per footprint is 2*sigma for the slab.

      DC circuits: series/parallel invariants clean. Series-bulb topology
      trap (add parallel bulb to one of two series bulbs -> untouched bulb
      gets brighter because total R drops). Missed initially on diagram
      parse, not physics. Harrison flagged self as experienced with circuits;
      AP focus should be parse + formalism traps.

      Codex correction landed: do not flatten valid intuition into formula-
      only correction. Preserve the intuition, then compress to the exam-safe
      formula. Saved to feedback_tutoring.md (subsequently moved to ai_tutor
      project memory).

      Built visualization at out/artifacts/2026-05-10_172431_gauss-surfaces.html
      with line/sheet/conductor side-by-side; PNG screenshot beside it.
      Added an npx -y live-server fallback line to project AGENTS.md.
    mochi_cards:
      - id: YcfAkWEI
        deck: ap e&m
        front: "Gauss's law on an infinite line of charge, linear density $\\lambda$. Why does the Gaussian cylinder length $L$ cancel?"
        back: "Flux $\\propto L$ and $q_{enc} \\propto L$. They cancel: $E = \\lambda/(2\\pi\\epsilon_0 r)$."
      - id: L8gvQXZz
        deck: ap e&m
        front: "Infinite nonconducting sheet, surface density $\\sigma$. Why is the Gaussian box flux $2EA$, not $EA$?"
        back: "Field exits both faces. Sides skim (zero flux). $E = \\sigma/(2\\epsilon_0)$."
      - id: fCPWySLJ
        deck: ap e&m
        front: "Why is $E$ just outside a conducting surface $\\sigma/\\epsilon_0$, while a nonconducting infinite sheet gives $\\sigma/(2\\epsilon_0)$?"
        back: "Conductor's inside has $E=0$; only the outside face counts. Sheet: both sides count."
      - id: pzBbRGI8
        deck: ap e&m
        front: "Infinite conducting slab with surface charge density $\\sigma$ on each outer face. Why does a Gaussian box around both faces give the same outside field as a tiny box crossing one face?"
        back: "Yes, $E = \\sigma/\\epsilon_0$. Big box: $q_{enc} = 2\\sigma A$, flux $2EA$, cancels to the same."
      - id: 305J7M8l
        deck: ap e&m
        front: "Gauss surface bookkeeping rule: which faces of a Gaussian surface contribute to flux?"
        back: "Only faces the field pierces. Faces the field skims along contribute zero."
      - id: MkJRnwB0
        deck: ap e&m
        front: "Two identical bulbs in series with an ideal battery. Add a third identical bulb in parallel with one of the original bulbs. What happens to the untouched series bulb's brightness?"
        back: "Brighter. Total $R$ drops to $1.5R$, total $I$ rises, untouched bulb carries it."
