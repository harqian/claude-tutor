      - id: QgQgRSZy
        deck: important ap
        front: "$E_\\text{total}$ of circular orbit?"
        back: "$-GMm/(2r)$. $K = +GMm/(2r)$, $U = -GMm/r$. $|K| = \\tfrac{1}{2}|U|$."
      - id: hcT2CzKc
        deck: important ap
        front: "$v_\\text{esc}$ from surface (mass $M$, radius $R$)?"
        back: "$\\sqrt{2GM/R}$. Set $E = 0$: $\\tfrac{1}{2}mv^2 = GMm/R$. Equals $\\sqrt{2}\\cdot v_\\text{circ}$."
