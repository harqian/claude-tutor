        back: "$E<0$ bound (ellipse), $E=0$ marginal (parabola), $E>0$ unbound (hyperbola). Convention: $U_g = 0$ at $r=\\infty$."
      - id: w4DkBXO3
        deck: important ap
        front: "$\\ddot{x} = -c \\cdot x$. Angular frequency?"
        back: "$\\omega = \\sqrt{c}$. Match against template $\\ddot{x} = -\\omega^2 x$."
      - id: pPON13GU
        deck: important ap
        front: "When is momentum conserved with external forces (e.g. gravity)?"
        back: "Component-wise. Conserved in any direction with no external force. Mud falling into railcar: gravity vertical, $p_x$ conserved → $Mv_0 = (M+m)v_f$."
      - id: 0fHYj0no
        deck: important ap
        front: "Person on rotating disk: how do they contribute to $I$?"
        back: "Point mass: $I_\\text{person} = mr^2$. No parallel-axis (that's for extended objects). Total $I = I_\\text{disk} + mr^2$."
      - id: kUXOcdCQ
        deck: important ap
        front: "Block sliding down ramp angle $\\theta$, kinetic friction $\\mu_k$. Acceleration?"
        back: "$a = g(\\sin\\theta - \\mu_k \\cos\\theta)$. $F_N = mg\\cos\\theta$, $ma = mg\\sin\\theta - \\mu_k F_N$."
